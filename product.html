<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Product Detail | Christ or Nothing</title>
    <meta name="description" content="View detailed product information for Christ or Nothing faith-based apparel.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail { margin: 80px 0 40px; }
        .product-detail-grid { display: grid; grid-template-columns: 1fr; gap: 30px; margin-bottom: 40px; }
        .product-detail-images { background: #111; padding: 20px; border: 1px solid #2A2A2A; border-radius: 12px; }
        .product-detail-main-image { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; }
        .product-detail-thumbnails { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .thumbnail { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 8px; }
        .thumbnail.active, .thumbnail:hover { border-color: white; }
        .product-detail-info h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 12px; }
        .product-detail-price { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; }
        .product-detail-description { color: #ccc; margin-bottom: 20px; white-space: pre-line; font-size: 0.9rem; }
        .color-btn, .size-btn { background: transparent; border: 1px solid #2A2A2A; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; color: white; cursor: pointer; margin: 4px; }
        .color-btn.active, .size-btn.active, .color-btn:hover, .size-btn:hover { background: white; color: black; }
        .add-to-cart-detail { background: white; color: black; border: none; padding: 12px 24px; width: 100%; font-weight: 700; font-size: 0.85rem; cursor: pointer; border-radius: 40px; margin-top: 20px; }
        .back-link { color: #888; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; font-size: 0.85rem; }
        .back-link:hover { color: white; }
        .recommendations-section { margin: 40px 0 60px; }
        .recommendations-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 20px; }
        .recommendation-card { background: #111; border: 1px solid #2A2A2A; padding: 12px; cursor: pointer; text-align: center; border-radius: 12px; }
        .recommendation-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; margin-bottom: 10px; }
        .recommendation-card h4 { font-size: 0.75rem; }
        .recommendation-card p { font-size: 0.8rem; font-weight: 700; }
        @media (min-width: 768px) {
            .product-detail-grid { grid-template-columns: 1fr 1fr; gap: 50px; }
            .recommendations-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
        }
    </style>
</head>
<body>
    <header id="mainHeader">
        <div class="container">
            <div class="navbar">
                <div class="logo-area">
                    <img src="images/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://placehold.co/200x200/ffffff/000000?text=✝️'">
                    <a href="index.html" class="brand-name">CHRIST OR NOTHING</a>
                </div>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html#tshirts">Tshirts</a></li>
                    <li><a href="index.html#hoodies">Hoodies</a></li>
                    <li><a href="index.html#sweaters">Sweaters</a></li>
                    <li><a href="index.html#headwear">Headwear</a></li>
                    <li><a href="index.html#contacts">Contact</a></li>
                </ul>
                <div class="cart-icon" id="cartIcon"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="product-detail" id="productDetail"></div>
        <section class="recommendations-section">
            <h2 class="section-title">You May Also Like</h2>
            <div class="recommendations-grid" id="recommendationsGrid"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><i class="fas fa-cross"></i> CHRIST OR NOTHING</div>
                <p>© 2026 — Faith in every stitch</p>
                <p>Created by <a href="https://chitsurolazarus-alt.github.io/L.C-WebCrafts-Studios/" target="_blank">L.C WebCrafts Studios</a></p>
            </div>
        </div>
    </footer>

    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header"><h3>Your Cart</h3><button id="closeCartBtn" class="close-modal">&times;</button></div>
            <div id="cartItemsList" class="cart-items"><div class="empty-cart">Your cart is empty</div></div>
            <div class="cart-footer">
                <div class="cart-total" id="cartTotalPrice">Total Items: 0</div>
                <div class="cart-total-amount" id="cartTotalAmount">Total: R 0</div>
                <button id="whatsappOrderBtn" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> Checkout via WhatsApp</button>
                <button id="clearCartBtn" class="clear-cart-btn">Clear Cart</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
